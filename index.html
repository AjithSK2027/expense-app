<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Udees</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --bg: #000;
            --accent: #007AFF;
            --card: rgba(28, 28, 30, 0.7);
            --border: rgba(255, 255, 255, 0.1);
        }

        body { 
            background: var(--bg); color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background-image: radial-gradient(circle at 0% 0%, #1c1c1e 0%, #000 100%);
            min-height: 100vh; -webkit-font-smoothing: antialiased;
        }

        /* Udees Loader (Apple Style) */
        #loader { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; transition: 0.5s ease; }
        .udees-loader { display: flex; flex-direction: column; align-items: center; }
        .icon-box { width: 72px; height: 72px; border-radius: 20px; background: #fff; position: relative; overflow: hidden; }
        .rise-line { position: absolute; bottom: 12px; left: 50%; width: 3px; height: 28px; background: #000; transform: translateX(-50%); border-radius: 2px; animation: rise 1.6s infinite ease-in-out; }
        @keyframes rise { 0% { transform: translate(-50%, 14px); opacity: 0; } 40% { opacity: 1; } 100% { transform: translate(-50%, -14px); opacity: 0; } }

        /* Dashboard UI */
        .glass-card { background: var(--card); backdrop-filter: blur(25px); border: 1px solid var(--border); border-radius: 28px; padding: 20px; margin-bottom: 16px; }
        
        .header-title { font-size: 34px; font-weight: 800; letter-spacing: -1px; margin-bottom: 25px; padding-left: 10px; }

        .stat-grid { display: flex; gap: 12px; margin-bottom: 16px; }
        .stat-item { flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 18px; text-align: left; }
        .stat-label { font-size: 11px; font-weight: 700; color: #8E8E93; text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-val { font-size: 24px; font-weight: 800; margin-top: 2px; }

        /* Custom Date Picker Card */
        .date-picker-card { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; }
        .date-picker-card input { background: transparent; border: none; color: var(--accent); font-weight: 600; font-size: 17px; outline: none; text-align: right; }

        /* Form Styling */
        .form-select, .form-control { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: #fff; border-radius: 16px; padding: 14px; font-size: 16px; margin-bottom: 12px; }
        .form-control:focus { background: rgba(255,255,255,0.08); border-color: var(--accent); color: #fff; box-shadow: none; }

        /* Segmented Toggles */
        .segmented-control { display: flex; background: #1c1c1e; padding: 3px; border-radius: 14px; gap: 4px; margin-bottom: 16px; }
        .segmented-control input { display: none; }
        .segmented-control label { flex: 1; text-align: center; padding: 10px; border-radius: 11px; font-size: 14px; font-weight: 600; cursor: pointer; color: #8E8E93; transition: 0.2s; }
        #debit:checked + label { background: #FF3B30; color: #fff; }
        #credit:checked + label { background: #34C759; color: #fff; }
        #upi:checked + label { background: var(--accent); color: #fff; }
        #cash:checked + label { background: #FF9F0A; color: #fff; }

        /* Action Buttons */
        .btn-scan { background: #fff; color: #000; border: none; width: 100%; padding: 18px; border-radius: 20px; font-weight: 700; font-size: 17px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-log { background: var(--accent); color: #fff; border: none; width: 100%; padding: 18px; border-radius: 20px; font-weight: 700; font-size: 17px; margin-top: 10px; box-shadow: 0 10px 30px rgba(0, 122, 255, 0.3); transition: 0.2s; }
        .btn-log:active { transform: scale(0.96); }

        /* Scanner Overlay */
        #scanner-view { display: none; position: fixed; inset: 0; background: #000; z-index: 11000; padding: 20px; }
        #reader { border-radius: 30px; overflow: hidden; }
        .close-scanner { background: #2c2c2e; border: none; color: #fff; width: 100%; padding: 16px; border-radius: 20px; margin-top: 20px; font-weight: 600; }
    </style>
</head>
<body>

<div id="loader">
    <div class="udees-loader">
        <div class="icon-box"><div class="rise-line"></div></div>
        <div class="mt-3 text-secondary" style="letter-spacing: 3px; font-weight: 700; font-size: 12px;">UDEES</div>
    </div>
</div>

<div id="scanner-view">
    <h3 class="text-center mb-4">Scan QR</h3>
    <div id="reader"></div>
    <button class="close-scanner" onclick="stopScanner()">Close Scanner</button>
</div>

<div class="container py-4" id="app" style="display:none;">
    <div class="header-title">Udees</div>

    <div class="stat-grid">
        <div class="stat-item">
            <span class="stat-label">Monthly Credit</span>
            <div id="credit-val" class="stat-val" style="color: #34C759;">₹0</div>
        </div>
        <div class="stat-item">
            <span class="stat-label">Monthly Debit</span>
            <div id="debit-val" class="stat-val" style="color: #FF3B30;">₹0</div>
        </div>
    </div>

    <div class="glass-card date-picker-card">
        <span style="font-weight: 600; color: #8E8E93;">Transaction Date</span>
        <input type="date" id="date">
    </div>

    <button class="btn-scan" onclick="startScanner()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M7 2H5C3.34315 2 2 3.34315 2 5V7M17 2H19C20.6569 2 22 3.34315 22 5V7M2 17V19C2 20.6569 3.34315 22 5 22H7M22 17V19C22 20.6569 20.6569 22 19 22H17" stroke="black" stroke-width="2.5" stroke-linecap="round"/><path d="M7 12H17" stroke="black" stroke-width="2" stroke-linecap="round"/></svg>
        Scan & Pay
    </button>

    <div class="glass-card">
        <select id="account" class="form-select"></select>
        <select id="particulars" class="form-select"></select>

        <div class="segmented-control">
            <input type="radio" name="type" id="debit" value="Debit" checked>
            <label for="debit">Debit</label>
            <input type="radio" name="type" id="credit" value="Credit">
            <label for="credit">Credit</label>
        </div>

        <div class="segmented-control">
            <input type="radio" name="mode" id="upi" value="UPI" checked>
            <label for="upi">UPI</label>
            <input type="radio" name="mode" id="cash" value="Cash">
            <label for="cash">Cash</label>
        </div>

        <input id="amount" type="number" class="form-control" placeholder="Amount (₹)" inputmode="decimal">
        <textarea id="note" class="form-control" rows="2" placeholder="Add a note..."></textarea>

        <button id="btn-log" class="btn-log" onclick="submit()">LOG TRANSACTION</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwQCYD_snGEqUDc47IDwvP2pJ4p2qcfgH8JrAWTHf-M7C0u9XbzP-1VxNc8dj5NjSwl/exec";
    let categories = {}, html5QrCode;

    window.onload = async () => {
        document.getElementById('date').value = new Date().toISOString().split('T')[0];
        try {
            let res = await fetch(`${SCRIPT_URL}?action=getData`);
            let data = await res.json();
            categories = data.categories;
            document.getElementById('credit-val').innerText = "₹" + data.totals.credit;
            document.getElementById('debit-val').innerText = "₹" + data.totals.debit;
            
            const accSelect = document.getElementById('account');
            Object.keys(categories).forEach(a => accSelect.add(new Option(a, a)));
            updateParticulars();
            
            document.getElementById('loader').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('app').style.display = 'block';
            }, 500);
        } catch(e) { alert("Check Connection"); }
    };

    document.getElementById('account').onchange = updateParticulars;

    function updateParticulars() {
        const pSelect = document.getElementById('particulars');
        pSelect.innerHTML = "";
        (categories[document.getElementById('account').value] || []).forEach(p => pSelect.add(new Option(p, p)));
    }

    function startScanner() {
        document.getElementById('scanner-view').style.display = 'block';
        html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
            if(text.includes("upi://pay")) {
                let amt = document.getElementById('amount').value;
                let url = amt ? `${text}&am=${amt}` : text;
                stopScanner();
                window.location.href = url;
            }
        });
    }

    function stopScanner() {
        if(html5QrCode) {
            html5QrCode.stop().then(() => {
                document.getElementById('scanner-view').style.display = 'none';
            });
        }
    }

    async function submit() {
        const btn = document.getElementById('btn-log');
        const amt = document.getElementById('amount').value;
        if(!amt) return alert("Enter Amount");

        btn.disabled = true;
        btn.innerText = "SYCHRONIZING...";

        const entry = {
            date: document.getElementById('date').value,
            account: document.getElementById('account').value,
            particulars: document.getElementById('particulars').value,
            type: document.querySelector('input[name="type"]:checked').value,
            mode: document.querySelector('input[name="mode"]:checked').value,
            amount: amt,
            note: document.getElementById('note').value
        };

        try {
            await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(entry) });
            alert("Entry Recorded");
            location.reload();
        } catch(e) {
            location.reload();
        }
    }
</script>
</body>
</html>
