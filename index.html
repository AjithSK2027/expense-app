<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SK Journal Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: #f8fafc; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .input-style { background: #0f172a; border: 1px solid #334155; color: white; width: 100%; border-radius: 12px; padding: 12px; outline: none; }
        .stat-card { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255,255,255,0.05); padding: 12px; border-radius: 16px; text-align: center; }
        .btn-pay { background: #10b981; font-weight: 700; padding: 12px; border-radius: 12px; width: 100%; margin-bottom: 8px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-save { background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%); font-weight: 700; width: 100%; padding: 16px; border-radius: 12px; }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md space-y-6">
        <header class="text-center">
            <h1 class="text-3xl font-bold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-cyan-400">SK Journal Pro</h1>
<body class="min-h-screen p-4">

    <div class="max-w-md mx-auto space-y-6">
        <div class="grid grid-cols-3 gap-3">
            <div class="stat-card">
                <p class="text-[10px] uppercase font-bold text-slate-500">Income</p>
                <p id="sum-income" class="text-sm font-bold text-emerald-400">₹0</p>
            </div>
            <div class="stat-card">
                <p class="text-[10px] uppercase font-bold text-slate-500">Expense</p>
                <p id="sum-expense" class="text-sm font-bold text-rose-400">₹0</p>
            </div>
            <div class="stat-card bg-indigo-500/10 border-indigo-500/20">
                <p class="text-[10px] uppercase font-bold text-indigo-400">Balance</p>
                <p id="sum-balance" class="text-sm font-bold text-white">₹0</p>
            </div>
        </div>

        <div class="glass-card rounded-3xl p-6 shadow-2xl">
            <form id="journalForm" class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Date</label>
                        <input type="date" id="date" name="date" required class="input-style text-xs">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Mode</label>
                        <select name="mode" class="input-style text-xs">
                            <option value="UPI" selected>UPI</option>
                            <option value="CASH">CASH</option>
                            <option value="BANK">BANK</option>
                        </select>
                    </div>
                </div>

                <div class="space-y-4">
                    <select id="account" name="account" required onchange="updateParticulars()" class="input-style appearance-none">
                        <option value="">Syncing Data...</option>
                    </select>
                    <select id="particulars" name="particulars" required class="input-style appearance-none">
                        <option value="">Select Account</option>
                    </select>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-bold text-emerald-400 uppercase ml-1">Credit (+)</label>
                        <input type="number" id="credit" name="credit" placeholder="0" step="any" class="input-style">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-rose-400 uppercase ml-1">Debit (-)</label>
                        <input type="number" id="debit" name="debit" placeholder="0" step="any" class="input-style">
                    </div>
                </div>

                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Note</label>
                    <textarea id="note" name="note" rows="2" placeholder="Details..." class="input-style resize-none"></textarea>
                </div>

                <div class="pt-2">
                    <button type="button" onclick="initiateUPI()" class="btn-pay">⚡ Pay via UPI</button>
                    <button type="submit" id="submitBtn" class="btn-save">Log Entry</button>
                </div>
            </form>
        </div>
        <div id="statusBox" class="text-center text-xs font-bold opacity-0 transition-opacity">Status</div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwhwaQLP9DNv3eK6Gt01uMCAUqrs5SbQAEQTgdD38mTqrVf7zKza1yvaH4bkaWxYX8/exec";
        const MY_UPI_ID = "ajith@upi"; 
        let masterConfig = {};

        const formatINR = (num) => new Intl.NumberFormat('en-IN', { style: 'currency', currency: 'INR', maximumFractionDigits: 0 }).format(num);

        window.onload = loadData;

        function loadData() {
            document.getElementById('date').valueAsDate = new Date();
            fetch(`${SCRIPT_URL}?action=getSettings`)
                .then(res => res.json())
                .then(data => {
                    masterConfig = data.config;
                    // Update Summary
                    document.getElementById('sum-income').textContent = formatINR(data.summary.income);
                    document.getElementById('sum-expense').textContent = formatINR(data.summary.expense);
                    document.getElementById('sum-balance').textContent = formatINR(data.summary.balance);
                    
                    const accSelect = document.getElementById('account');
                    accSelect.innerHTML = '<option value="" disabled selected>Choose Account</option>';
                    Object.keys(masterConfig).forEach(acc => { accSelect.innerHTML += `<option value="${acc}">${acc}</option>`; });
                });
        }

        function initiateUPI() {
            const amount = document.getElementById('debit').value || document.getElementById('credit').value;
            const note = document.getElementById('note').value || "SK Journal";
            if(!amount || amount <= 0) return alert("Enter amount");
            window.location.href = `upi://pay?pa=${MY_UPI_ID}&pn=SK%20Designs&am=${amount}&tn=${encodeURIComponent(note)}&cu=INR`;
        }

        function updateParticulars() {
            const acc = document.getElementById('account').value;
            const partSelect = document.getElementById('particulars');
            partSelect.innerHTML = '<option value="" disabled selected>Choose Particular</option>';
            if (masterConfig[acc]) {
                masterConfig[acc].forEach(p => { partSelect.innerHTML += `<option value="${p}">${p}</option>`; });
            }
        }

        document.getElementById('journalForm').onsubmit = function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true; btn.innerText = "Saving...";

            fetch(SCRIPT_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "text/plain" },
                body: JSON.stringify({
                    date: this.date.value,
                    mode: this.mode.value,
                    account: this.account.value,
                    particulars: this.particulars.value,
                    credit: this.credit.value || 0,
                    debit: this.debit.value || 0,
                    note: this.note.value
                })
            })
            .then(() => {
                btn.disabled = false; btn.innerText = "Log Entry";
                showFeedback("✓ Synced", "text-emerald-400");
                this.reset();
                loadData(); // Refresh totals after saving
            });
        };

        function showFeedback(msg, cls) {
            const sb = document.getElementById('statusBox');
            sb.textContent = msg; sb.className = `text-center text-xs font-bold opacity-100 ${cls}`;
            setTimeout(() => sb.classList.replace('opacity-100', 'opacity-0'), 3000);
        }
    </script>
</body>
</html>
