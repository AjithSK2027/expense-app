<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Udees</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
:root{
  --accent:#3b82f6;
  --glass:rgba(255,255,255,0.04);
  --border:rgba(255,255,255,0.1);
}

/* Background */
body{
  background:#000;
  color:#fff;
  font-family:-apple-system,system-ui;
  background-image:
    radial-gradient(circle at top right,#1e3a8a,transparent),
    radial-gradient(circle at bottom left,#111,#000);
}

/* Loader */
#loader{
  position:fixed; inset:0;
  background:#000;
  display:flex; align-items:center; justify-content:center;
  flex-direction:column;
  z-index:9999;
  transition:0.4s;
}
.icon{
  width:70px;height:70px;border-radius:20px;
  background:#111; position:relative;
  animation:pulse 2s infinite;
}
.line{
  position:absolute; bottom:14px; left:50%;
  width:2px;height:26px;background:#fff;
  transform:translateX(-50%);
  animation:rise 1.6s infinite;
}
@keyframes rise{
  0%{transform:translate(-50%,10px);opacity:0}
  50%{opacity:1}
  100%{transform:translate(-50%,-12px);opacity:0}
}
@keyframes pulse{
  50%{transform:scale(1.05)}
}

/* Glass */
.glass{
  background:var(--glass);
  border:1px solid var(--border);
  border-radius:24px;
  padding:20px;
  backdrop-filter:blur(20px);
  box-shadow:0 20px 40px rgba(0,0,0,0.4);
}

/* Inputs */
.form-control,.form-select{
  background:rgba(255,255,255,0.05);
  border:1px solid var(--border);
  color:#fff;
  border-radius:12px;
}
.form-control:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 1px var(--accent),
             0 6px 20px rgba(59,130,246,0.2);
}

/* Toggles */
.toggle{
  display:flex;
  background:rgba(255,255,255,0.05);
  border-radius:14px;
  padding:4px;
  gap:6px;
  margin-top:10px;
}
.toggle input{display:none;}
.toggle label{
  flex:1;text-align:center;padding:10px;
  border-radius:10px;font-weight:600;
  cursor:pointer;color:#777;
  transition:0.25s;
}

/* Type */
#type-debit:checked + label{
  background:rgba(239,68,68,0.2);
  color:#ef4444;
}
#type-credit:checked + label{
  background:rgba(34,197,94,0.2);
  color:#22c55e;
}

/* Mode */
#mode-upi:checked + label{
  background:rgba(59,130,246,0.2);
  color:#3b82f6;
}
#mode-cash:checked + label{
  background:rgba(245,158,11,0.2);
  color:#f59e0b;
}

/* Buttons */
.btn-main{
  background:var(--accent);
  padding:16px;
  border-radius:14px;
  font-weight:700;
  border:none;
  width:100%;
  margin-top:15px;
}
.btn-main:active{transform:scale(0.97);}

.btn-scan{
  background:#fff;color:#000;
  border-radius:14px;
  padding:12px;
  font-weight:600;
  border:none;
  width:100%;
  margin-bottom:10px;
}

/* Stats */
.stat{font-size:22px;font-weight:800;}

#reader{
  display:none;
  border-radius:20px;
  overflow:hidden;
  margin-bottom:15px;
}
</style>
</head>

<body>

<div id="loader">
  <div class="icon"><div class="line"></div></div>
  <div class="mt-3">UDEES</div>
</div>

<div class="container py-4" id="app" style="display:none;">

<h3 class="text-center mb-4">Udees</h3>

<div class="row g-3 mb-4">
  <div class="col-6">
    <div class="glass text-center">
      <small>Credit</small>
      <div id="credit" class="stat text-success">₹0</div>
    </div>
  </div>
  <div class="col-6">
    <div class="glass text-center">
      <small>Debit</small>
      <div id="debit" class="stat text-danger">₹0</div>
    </div>
  </div>
</div>

<div id="reader"></div>

<div class="glass">

<button class="btn-scan" onclick="startScanner()">📸 Scan & Pay</button>

<select id="account" class="form-select mb-2"></select>
<select id="particulars" class="form-select mb-2"></select>

<!-- TYPE -->
<div class="toggle">
  <input type="radio" name="type" id="type-debit" value="Debit" checked>
  <label for="type-debit">Debit</label>
  <input type="radio" name="type" id="type-credit" value="Credit">
  <label for="type-credit">Credit</label>
</div>

<!-- MODE -->
<div class="toggle">
  <input type="radio" name="mode" id="mode-upi" value="UPI" checked>
  <label for="mode-upi">UPI</label>
  <input type="radio" name="mode" id="mode-cash" value="Cash">
  <label for="mode-cash">Cash</label>
</div>

<input id="amount" type="number" class="form-control mt-3" placeholder="Amount">
<input id="note" type="text" class="form-control mt-2" placeholder="Note">

<button id="btn" class="btn-main" onclick="submit()">LOG EXPENSE</button>

</div>
</div>

<script>
const SCRIPT_URL="https://script.google.com/macros/s/AKfycbwQCYD_snGEqUDc47IDwvP2pJ4p2qcfgH8JrAWTHf-M7C0u9XbzP-1VxNc8dj5NjSwl/exec";
let categories={}, scanner;

/* INIT */
window.onload=async()=>{
 let res=await fetch(`${SCRIPT_URL}?action=getData`);
 let data=await res.json();

 categories=data.categories;
 credit.innerText="₹"+data.totals.credit;
 debit.innerText="₹"+data.totals.debit;

 Object.keys(categories).forEach(a=>{
  account.add(new Option(a,a));
 });

 updateParticulars();

 loader.style.opacity=0;
 setTimeout(()=>{
  loader.style.display="none";
  app.style.display="block";
 },400);
};

account.onchange=updateParticulars;

function updateParticulars(){
 particulars.innerHTML="";
 (categories[account.value]||[]).forEach(p=>{
  particulars.add(new Option(p,p));
 });
}

/* TYPE TEXT */
document.querySelectorAll('input[name="type"]').forEach(el=>{
 el.onchange=()=>{
  btn.innerText = el.value==="Credit"?"ADD INCOME":"LOG EXPENSE";
 };
});

/* QR */
function startScanner(){
 reader.style.display="block";

 scanner=new Html5QrcodeScanner("reader",{fps:10,qrbox:250});

 scanner.render(text=>{
  if(text.includes("upi://pay")){
   let amt=amount.value;
   let link=amt?`${text}&am=${amt}`:text;
   scanner.clear();
   reader.style.display="none";
   window.location.href=link;
  }else{
   alert("Invalid UPI QR");
  }
 });
}

/* SUBMIT */
async function submit(){
 if(btn.disabled) return;

 let entry={
  account:account.value,
  particulars:particulars.value,
  type:document.querySelector('input[name="type"]:checked').value,
  mode:document.querySelector('input[name="mode"]:checked').value,
  amount:amount.value,
  note:note.value
 };

 if(!entry.amount){alert("Enter amount");return;}

 btn.disabled=true;
 btn.innerText="Saving...";

 let res=await fetch(SCRIPT_URL,{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify(entry)
 });

 let data=await res.json();

 if(data.result!=="Success"){
  alert(data.error);
 }

 updateUI(entry);
 reset();

 btn.disabled=false;
 btn.innerText = entry.type==="Credit"?"ADD INCOME":"LOG EXPENSE";
}

/* UPDATE */
function updateUI(e){
 let amt=parseFloat(e.amount)||0;

 if(e.type==="Credit"){
  credit.innerText="₹"+(parseFloat(credit.innerText.replace('₹',''))+amt);
 }else{
  debit.innerText="₹"+(parseFloat(debit.innerText.replace('₹',''))+amt);
 }
}

function reset(){
 amount.value="";
 note.value="";
}
</script>

</body>
</html>
