<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Udees Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --primary: #007AFF; --bg: #F2F2F7; --card: #fff; --text: #1C1C1E; --sub: #8E8E93; --success: #34C759; --danger: #FF3B30; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; letter-spacing: -0.02em; -webkit-font-smoothing: antialiased; }
        
        #loader { position: fixed; inset: 0; background: #fff; display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .header { padding: 30px 24px 10px; }
        .wallet-card { background: var(--card); border-radius: 32px; padding: 30px; margin: 10px 20px 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.04); border: 1px solid #fff; }
        .wallet-val { font-size: 42px; font-weight: 800; margin: 5px 0; letter-spacing: -0.05em; }

        .btn-scan { background: #000; color: #fff; width: calc(100% - 40px); margin: 0 20px 25px; padding: 18px; border-radius: 22px; font-weight: 700; border: none; display: flex; align-items: center; justify-content: center; gap: 10px; }
        
        .log-section { background: #fff; border-radius: 40px 40px 0 0; padding: 35px 24px 100px; box-shadow: 0 -15px 40px rgba(0,0,0,0.03); }
        .form-control, .form-select { background: #F4F4F7; border: none; border-radius: 18px; padding: 16px; font-size: 16px; font-weight: 600; margin-bottom: 15px; }
        
        .segment { display: flex; background: #F4F4F7; padding: 4px; border-radius: 18px; margin-bottom: 20px; }
        .segment input { display: none; }
        .segment label { flex: 1; text-align: center; padding: 12px; border-radius: 14px; font-size: 14px; font-weight: 700; color: var(--sub); transition: 0.2s; }
        #type-debit:checked + label { background: #fff; color: var(--danger); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        #type-credit:checked + label { background: #fff; color: var(--success); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        #mode-upi:checked + label { background: var(--primary); color: #fff; }
        #mode-cash:checked + label { background: #000; color: #fff; }

        .btn-confirm { background: var(--primary); color: #fff; border: none; border-radius: 24px; width: 100%; padding: 20px; font-weight: 700; font-size: 18px; box-shadow: 0 15px 30px rgba(0,122,255,0.2); }

        /* Payment Drawer */
        #payment-drawer { display: none; position: fixed; bottom: 0; left: 0; width: 100%; background: #fff; border-radius: 30px 30px 0 0; padding: 30px 24px; z-index: 12000; box-shadow: 0 -10px 50px rgba(0,0,0,0.2); }
        .pay-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        .pay-btn { border: 1px solid #F2F2F7; padding: 15px; border-radius: 20px; font-weight: 700; font-size: 14px; display: flex; align-items: center; justify-content: center; gap: 8px; background: #fff; }
        
        #scanner-view { display: none; position: fixed; inset: 0; background: #000; z-index: 11000; padding: 25px; }
        #reader { border-radius: 30px; overflow: hidden; margin-top: 40px; }
    </style>
</head>
<body>

<div id="loader"><b>UDEES PRO</b></div>

<div id="scanner-view">
    <div id="reader"></div>
    <button class="btn w-100 py-3 text-white mt-4" onclick="stopScanner()">Cancel</button>
</div>

<div id="payment-drawer">
    <h6 class="text-center fw-bold">Select Payment App</h6>
    <div class="pay-grid">
        <button class="pay-btn" onclick="payWith('phonepe')">🟣 PhonePe</button>
        <button class="pay-btn" onclick="payWith('googlepay')">🔵 GPay</button>
        <button class="pay-btn" onclick="payWith('paytm')">🔵 Paytm</button>
        <button class="pay-btn" onclick="payWith('bhim')">🟠 BHIM</button>
    </div>
    <button class="btn w-100 mt-4 text-secondary" onclick="closeDrawer()">Cancel</button>
</div>

<div id="app" style="display:none;">
    <div class="header">
        <div class="user-name">Welcome, SK</div>
    </div>

    <div class="wallet-card">
        <div style="font-size:12px; font-weight:700; color:var(--sub)">TOTAL EXPENSE</div>
        <div class="wallet-val" id="total-spent">₹0</div>
    </div>

    <button class="btn-scan" onclick="startScanner()">📸 SCAN & PAY</button>

    <div class="log-section">
        <input type="date" id="date" class="form-control">
        <select id="account" class="form-select" onchange="updateParticulars()"></select>
        <select id="particulars" class="form-select"></select>

        <div class="segment">
            <input type="radio" name="type" id="type-debit" value="Debit" checked>
            <label for="type-debit">Debit</label>
            <input type="radio" name="type" id="type-credit" value="Credit">
            <label for="type-credit">Credit</label>
        </div>

        <div class="segment">
            <input type="radio" name="mode" id="mode-upi" value="UPI" checked>
            <label for="mode-upi">UPI</label>
            <input type="radio" name="mode" id="mode-cash" value="Cash">
            <label for="mode-cash">Cash</label>
        </div>

        <input id="amount" type="number" class="form-control" placeholder="Amount (₹)" inputmode="decimal">
        <input id="note" type="text" class="form-control" placeholder="Notes">

        <button class="btn-confirm" onclick="submit()" id="subBtn">LOG TRANSACTION</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwQCYD_snGEqUDc47IDwvP2pJ4p2qcfgH8JrAWTHf-M7C0u9XbzP-1VxNc8dj5NjSwl/exec";
    let categories = {}, html5QrCode, currentUPI = "";

    window.onload = async () => {
        document.getElementById('date').value = new Date().toISOString().split('T')[0];
        let res = await fetch(`${SCRIPT_URL}?action=getData`);
        let data = await res.json();
        categories = data.categories;
        document.getElementById('total-spent').innerText = "₹" + data.totals.debit;
        Object.keys(categories).forEach(a => document.getElementById('account').add(new Option(a, a)));
        updateParticulars();
        document.getElementById('loader').style.display = 'none';
        document.getElementById('app').style.display = 'block';
    };

    function updateParticulars() {
        const p = document.getElementById('particulars'); p.innerHTML = "";
        (categories[document.getElementById('account').value] || []).forEach(item => p.add(new Option(item, item)));
    }

    function startScanner() {
        document.getElementById('scanner-view').style.display = 'block';
        html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, (text) => {
            if(text.includes("upi://pay")) {
                currentUPI = text;
                stopScanner();
                document.getElementById('payment-drawer').style.display = 'block';
            }
        });
    }

    function stopScanner() {
        if(html5QrCode) html5QrCode.stop().then(() => { document.getElementById('scanner-view').style.display = 'none'; });
    }

    function payWith(app) {
        let amt = document.getElementById('amount').value;
        let base = currentUPI;
        if(amt) base += `&am=${amt}`;
        
        let url = base;
        if(app === 'phonepe') url = base.replace('upi://', 'phonepe://');
        if(app === 'googlepay') url = base.replace('upi://', 'tez://ujp/pay'); // Specific GPay intent
        if(app === 'paytm') url = base.replace('upi://', 'paytmmp://');
        
        window.location.href = url;
        closeDrawer();
    }

    function closeDrawer() { document.getElementById('payment-drawer').style.display = 'none'; }

    async function submit() {
        const btn = document.getElementById('subBtn');
        const amt = document.getElementById('amount').value;
        if(!amt) return;

        btn.disabled = true; btn.innerText = "SAVING...";

        const entry = {
            date: document.getElementById('date').value,
            account: document.getElementById('account').value,
            particulars: document.getElementById('particulars').value,
            type: document.querySelector('input[name="type"]:checked').value,
            mode: document.querySelector('input[name="mode"]:checked').value,
            amount: amt,
            note: document.getElementById('note').value
        };

        // UI Optimistic Update
        let currentTotal = parseInt(document.getElementById('total-spent').innerText.replace('₹',''));
        if(entry.type === 'Debit') document.getElementById('total-spent').innerText = "₹" + (currentTotal + parseInt(amt));

        fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(entry) });
        
        // Reset form without reload
        document.getElementById('amount').value = "";
        document.getElementById('note').value = "";
        btn.disabled = false; btn.innerText = "LOG TRANSACTION";
        alert("Logged Successfully");
    }
</script>
</body>
</html>
