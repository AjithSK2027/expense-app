<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Udees Pro — Money Manager</title>
  <!-- Tailwind + Inter font -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <!-- HTML5 QR Code library (for scanning, optional - keeping for future but not used in core) -->
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    /* RESET & GLOBAL */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #F8FAFC;
      color: #0F172A;
      padding: 1rem;
      transition: background 0.2s, color 0.2s;
    }

    /* Light mode defaults */
    .card {
      background: #FFFFFF;
      border-radius: 1.75rem;
      border: 1px solid #E2E8F0;
      box-shadow: 0 8px 20px -6px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.02);
      padding: 1.25rem;
      transition: transform 0.1s ease, box-shadow 0.2s ease;
    }
    .card:active {
      transform: scale(0.98);
    }
    .stat-card {
      background: #FFFFFF;
      border-radius: 1.25rem;
      padding: 0.75rem 0.5rem;
      text-align: center;
      box-shadow: 0 2px 6px rgba(0,0,0,0.02);
      border: 1px solid #E2E8F0;
    }
    .input-field {
      background: #FFFFFF;
      border: 1px solid #CBD5E1;
      border-radius: 1rem;
      padding: 0.75rem 1rem;
      width: 100%;
      font-size: 0.95rem;
      transition: all 0.15s;
    }
    .input-field:focus {
      outline: none;
      border-color: #0D9488;
      box-shadow: 0 0 0 3px rgba(13,148,136,0.2);
    }
    .btn-primary {
      background: #0D9488;
      color: white;
      border-radius: 1rem;
      padding: 0.85rem;
      font-weight: 700;
      text-align: center;
      transition: all 0.15s;
      cursor: pointer;
      border: none;
      width: 100%;
    }
    .btn-primary:active {
      transform: scale(0.97);
      background: #0F766E;
    }
    .btn-outline {
      background: transparent;
      border: 1px solid #CBD5E1;
      border-radius: 1rem;
      padding: 0.75rem;
      font-weight: 600;
      transition: all 0.15s;
      cursor: pointer;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    .btn-outline:active {
      transform: scale(0.97);
      background: #F1F5F9;
    }
    /* Tabs */
    .tab-active {
      background: #0D9488;
      color: white;
    }
    .tab-inactive {
      background: transparent;
      color: #475569;
    }
    /* Account card inside summary */
    .account-chip {
      background: #F8FAFC;
      border-radius: 1rem;
      padding: 0.75rem;
      border: 1px solid #E2E8F0;
      flex: 1 1 140px;
      transition: all 0.1s;
    }
    .account-chip:active {
      transform: scale(0.97);
    }
    .progress-bar {
      height: 4px;
      background: #E2E8F0;
      border-radius: 4px;
      overflow: hidden;
      margin-top: 0.5rem;
    }
    .progress-fill {
      height: 100%;
      background: #0D9488;
      width: 0%;
      border-radius: 4px;
    }
    /* Dark mode overrides - explicit and safe */
    @media (prefers-color-scheme: dark) {
      body {
        background: #0F172A;
        color: #F1F5F9;
      }
      .card, .stat-card, .account-chip {
        background: #1E293B;
        border-color: #334155;
      }
      .input-field {
        background: #0F172A;
        border-color: #334155;
        color: #F1F5F9;
      }
      .btn-outline {
        border-color: #475569;
        color: #E2E8F0;
      }
      .btn-outline:active {
        background: #334155;
      }
      .tab-inactive {
        color: #94A3B8;
      }
      /* ensure all text contrast */
      .text-slate-500, .text-slate-400, .label-text {
        color: #94A3B8 !important;
      }
      .text-emerald-600 {
        color: #34D399 !important;
      }
      .text-rose-600 {
        color: #F87171 !important;
      }
      .text-teal-600 {
        color: #2DD4BF !important;
      }
    }
    /* Utility to prevent overflow */
    .min-width-0 {
      min-width: 0;
    }
    .grid > * {
      min-width: 0;
    }
    .overflow-auto-safe {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    table {
      min-width: 500px;
    }
    @media (max-width: 560px) {
      body {
        padding: 0.75rem;
      }
      .card {
        padding: 1rem;
      }
      .input-field {
        font-size: 0.9rem;
        padding: 0.6rem 0.8rem;
      }
    }
  </style>
</head>
<body>

<div class="max-w-2xl mx-auto space-y-4">
  <!-- header -->
  <div class="flex justify-between items-center">
    <div>
      <h1 class="text-2xl font-black tracking-tight text-slate-800 dark:text-white">Udees Pro</h1>
      <p class="text-xs text-slate-500">spend · save · voice · receipts</p>
    </div>
    <div class="text-[11px] font-mono bg-white dark:bg-slate-800 px-3 py-1 rounded-full shadow-sm border border-slate-200 dark:border-slate-700">
      <span class="text-emerald-600">●</span> live
    </div>
  </div>

  <!-- stats row -->
  <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
    <div class="stat-card"><div class="text-[11px] font-semibold uppercase text-slate-500">Income</div><div id="totalIncome" class="text-xl font-black text-emerald-600">₹0</div></div>
    <div class="stat-card"><div class="text-[11px] font-semibold uppercase text-slate-500">Expense</div><div id="totalExpense" class="text-xl font-black text-rose-600">₹0</div></div>
    <div class="stat-card"><div class="text-[11px] font-semibold uppercase text-slate-500">Net</div><div id="netBalance" class="text-xl font-black text-slate-800 dark:text-white">₹0</div></div>
    <div class="stat-card"><div class="text-[11px] font-semibold uppercase text-slate-500">Avg Daily</div><div id="avgDailySpend" class="text-lg font-black text-teal-600">₹0</div></div>
  </div>

  <!-- account summary chips -->
  <div class="card">
    <h3 class="text-xs font-bold uppercase text-slate-500">Balances by Account</h3>
    <div id="accountsGrid" class="flex flex-wrap gap-2 mt-2"></div>
  </div>

  <!-- tabs -->
  <div class="flex gap-2 bg-white dark:bg-slate-800/30 p-1 rounded-xl border border-slate-200 dark:border-slate-700">
    <button id="tabAddBtn" class="tab-active flex-1 py-2.5 rounded-lg text-sm font-bold transition-all">➕ Add</button>
    <button id="tabReportBtn" class="tab-inactive flex-1 py-2.5 rounded-lg text-sm font-semibold transition-all">📊 Reports</button>
  </div>

  <!-- ADD ENTRY PANEL -->
  <div id="addPanel" class="card space-y-4">
    <form id="entryForm" class="space-y-3">
      <div class="grid grid-cols-2 gap-3">
        <div><label class="text-[10px] font-bold text-slate-500">DATE</label><input type="date" id="date" class="input-field"></div>
        <div><label class="text-[10px] font-bold text-slate-500">MODE</label><select id="mode" class="input-field"><option value="UPI">UPI</option><option value="CASH">CASH</option><option value="BANK">BANK</option></select></div>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div><label class="text-[10px] font-bold text-slate-500">ACCOUNT</label><select id="account" required class="input-field"></select></div>
        <div><label class="text-[10px] font-bold text-slate-500">CATEGORY</label><select id="particulars" required class="input-field"></select></div>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div><label class="text-[10px] font-bold text-emerald-600">INCOME (₹)</label><input type="number" id="creditAmount" placeholder="0" step="any" class="input-field"></div>
        <div><label class="text-[10px] font-bold text-rose-600">EXPENSE (₹)</label><input type="number" id="debitAmount" placeholder="0" step="any" class="input-field"></div>
      </div>
      <div>
        <label class="text-[10px] font-bold text-slate-500">NOTE</label>
        <div class="flex gap-2">
          <textarea id="note" rows="2" placeholder="Optional details..." class="input-field resize-none flex-1"></textarea>
          <button type="button" id="voiceBtn" class="btn-outline w-auto px-4 text-xl">🎤</button>
        </div>
      </div>
      <!-- receipt -->
      <button type="button" id="attachReceiptBtn" class="btn-outline">📎 Attach Receipt</button>
      <input type="file" id="receiptInput" accept="image/*" capture="environment" class="hidden">
      <div id="receiptPreview" class="text-xs text-slate-500 text-center hidden"></div>
      <!-- location -->
      <button type="button" id="locateBtn" class="btn-outline">📍 Add Current Location</button>
      <input type="hidden" id="latitude" value="">
      <input type="hidden" id="longitude" value="">
      <div id="locationStatus" class="text-xs text-center text-slate-400 hidden"></div>
      <button type="submit" class="btn-primary">➕ Add Transaction</button>
    </form>
  </div>

  <!-- REPORTS PANEL -->
  <div id="reportPanel" class="card hidden space-y-4">
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3">
      <div><label class="text-[10px] font-bold text-slate-500">MONTH</label><input type="month" id="reportMonth" class="input-field"></div>
      <div><label class="text-[10px] font-bold text-slate-500">ACCOUNT</label><select id="filterAccount" class="input-field"><option value="all">All Accounts</option></select></div>
      <div><label class="text-[10px] font-bold text-slate-500">CATEGORY</label><select id="filterCategory" class="input-field"><option value="all">All Categories</option></select></div>
      <div><button id="applyReportBtn" class="btn-primary py-2">Apply</button></div>
    </div>
    <div class="grid grid-cols-2 gap-3">
      <div class="card p-3 text-center"><span class="text-xs text-slate-500">Income</span><br><span id="reportIncome" class="text-xl font-bold text-emerald-600">₹0</span></div>
      <div class="card p-3 text-center"><span class="text-xs text-slate-500">Expense</span><br><span id="reportExpense" class="text-xl font-bold text-rose-600">₹0</span></div>
    </div>
    <div class="overflow-auto-safe max-h-80 overflow-y-auto">
      <table class="w-full text-sm">
        <thead class="text-slate-500 border-b border-slate-200 dark:border-slate-700">*
          <th class="py-2 text-left">Date</th><th class="text-left">Account</th><th class="text-left">Category</th><th class="text-right">Amount</th><th class="text-center">📍</th><th class="text-center">📸</th>
        </thead>
        <tbody id="reportTableBody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- receipt modal -->
<div id="receiptModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center z-50 opacity-0 pointer-events-none transition-all">
  <div class="max-w-[90%] max-h-[80%] bg-white dark:bg-slate-800 rounded-2xl overflow-hidden shadow-2xl">
    <img id="modalImage" src="" alt="receipt" class="max-w-full max-h-full object-contain">
  </div>
</div>

<div id="toastMsg" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-white dark:bg-slate-800 text-slate-800 dark:text-white px-5 py-2 rounded-full shadow-lg border border-slate-200 dark:border-slate-700 font-semibold text-sm z-50 transition-all duration-200 opacity-0 pointer-events-none">✓</div>

<script>
  // ---------------------------- CONFIG ---------------------------------
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyKaGhWnNqF22Wgn6ILokGj5sROF-Pqk4h-grULLvop6rhWEe4cZ_WxrfNY4qy_yhCq/exec"; // REPLACE WITH YOUR WEB APP URL
  let masterConfig = {};
  let allEntries = [];
  let currentReceiptBase64 = "";

  // helpers
  const formatINR = (val) => new Intl.NumberFormat('en-IN', { style: 'currency', currency: 'INR', maximumFractionDigits: 0 }).format(val || 0);
  const formatDateMDY = (isoDate) => {
    if (!isoDate) return '—';
    let d = new Date(isoDate);
    return d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
  };
  const showToast = (msg) => {
    const toast = document.getElementById('toastMsg');
    toast.innerText = `✓ ${msg}`;
    toast.classList.add('opacity-100', 'pointer-events-auto');
    setTimeout(() => toast.classList.remove('opacity-100', 'pointer-events-auto'), 2500);
  };

  // cache & sync
  const saveCache = () => {
    localStorage.setItem('udees_entries', JSON.stringify(allEntries));
    localStorage.setItem('udees_config', JSON.stringify(masterConfig));
  };
  const loadCache = () => {
    const e = localStorage.getItem('udees_entries');
    const c = localStorage.getItem('udees_config');
    if (e) allEntries = JSON.parse(e);
    if (c) masterConfig = JSON.parse(c);
    return !!e;
  };
  const backgroundSync = async () => {
    try {
      const [entriesRes, settingsRes] = await Promise.all([
        fetch(`${SCRIPT_URL}?action=getEntries`).then(r => r.json()).catch(() => []),
        fetch(`${SCRIPT_URL}?action=getSettings`).then(r => r.json()).catch(() => ({}))
      ]);
      const remoteEntries = Array.isArray(entriesRes) ? entriesRes : [];
      const remoteConfig = settingsRes.config || {};
      const map = new Map();
      allEntries.forEach(e => { if (e.id) map.set(e.id, e); });
      remoteEntries.forEach(r => { if (r.id) map.set(r.id, { ...r, receipt: r.receipt || "" }); });
      allEntries = Array.from(map.values()).sort((a,b) => new Date(b.date) - new Date(a.date));
      masterConfig = remoteConfig;
      saveCache();
      renderAllUI();
    } catch (err) { console.warn(err); }
  };
  const addEntryLocal = async (entry) => {
    const tempId = 'local_' + Date.now() + '_' + Math.random();
    allEntries.unshift({ ...entry, id: tempId });
    saveCache();
    renderAllUI();
    fetch(SCRIPT_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify(entry)
    }).catch(() => {});
    setTimeout(() => backgroundSync(), 1500);
    showToast("Transaction saved");
  };

  // UI rendering
  const computeTotals = () => {
    let inc = 0, exp = 0;
    allEntries.forEach(e => { inc += e.credit || 0; exp += e.debit || 0; });
    return { inc, exp, balance: inc - exp };
  };
  const avgDailySpend = () => {
    if (!allEntries.length) return 0;
    let totalExp = 0, days = new Set();
    allEntries.forEach(e => { totalExp += e.debit || 0; if (e.date) days.add(e.date); });
    return totalExp / (days.size || 1);
  };
  const renderAccountChips = () => {
    const map = new Map();
    allEntries.forEach(e => {
      if (!e.account) return;
      if (!map.has(e.account)) map.set(e.account, { inc: 0, exp: 0 });
      const d = map.get(e.account);
      d.inc += e.credit || 0;
      d.exp += e.debit || 0;
    });
    const container = document.getElementById('accountsGrid');
    if (!map.size) { container.innerHTML = '<div class="text-xs text-slate-400">No accounts yet</div>'; return; }
    const totalExpAll = Array.from(map.values()).reduce((s, v) => s + v.exp, 0);
    let html = '';
    for (let [acc, val] of map.entries()) {
      const percent = totalExpAll > 0 ? (val.exp / totalExpAll) * 100 : 0;
      html += `
        <div class="account-chip">
          <div class="flex justify-between items-center">
            <span class="font-bold text-sm">${acc}</span>
            <div class="text-right text-xs">
              <div class="text-emerald-600">+${formatINR(val.inc)}</div>
              <div class="text-rose-600">-${formatINR(val.exp)}</div>
            </div>
          </div>
          <div class="progress-bar"><div class="progress-fill" style="width: ${percent}%"></div></div>
        </div>
      `;
    }
    container.innerHTML = html;
  };
  const populateDropdowns = () => {
    const accounts = Object.keys(masterConfig);
    const accSel = document.getElementById('account');
    const fAcc = document.getElementById('filterAccount');
    if (accounts.length) {
      accSel.innerHTML = '<option value="" disabled selected>Select account</option>' + accounts.map(a => `<option value="${a}">${a}</option>`).join('');
      fAcc.innerHTML = '<option value="all">All Accounts</option>' + accounts.map(a => `<option value="${a}">${a}</option>`).join('');
    } else {
      accSel.innerHTML = '<option>No accounts</option>';
      fAcc.innerHTML = '<option value="all">All</option>';
    }
    updateParticulars();
  };
  const updateParticulars = () => {
    const acc = document.getElementById('account').value;
    const partSel = document.getElementById('particulars');
    if (acc && masterConfig[acc]) {
      partSel.innerHTML = '<option value="" disabled selected>Select category</option>' + masterConfig[acc].map(p => `<option value="${p}">${p}</option>`).join('');
    } else {
      partSel.innerHTML = '<option value="">Choose account first</option>';
    }
  };
  const renderAllUI = () => {
    const { inc, exp, balance } = computeTotals();
    document.getElementById('totalIncome').innerHTML = formatINR(inc);
    document.getElementById('totalExpense').innerHTML = formatINR(exp);
    document.getElementById('netBalance').innerHTML = formatINR(balance);
    document.getElementById('avgDailySpend').innerHTML = formatINR(avgDailySpend());
    renderAccountChips();
    populateDropdowns();
    if (!document.getElementById('reportPanel').classList.contains('hidden')) applyReportFilters();
  };

  // report filters & table
  const updateFilterCategories = () => {
    const fAcc = document.getElementById('filterAccount').value;
    const catSel = document.getElementById('filterCategory');
    if (fAcc === 'all') {
      const allCats = new Set();
      allEntries.forEach(e => { if (e.particulars) allCats.add(e.particulars); });
      catSel.innerHTML = '<option value="all">All Categories</option>' + Array.from(allCats).map(c => `<option value="${c}">${c}</option>`).join('');
    } else {
      const cats = masterConfig[fAcc] || [];
      catSel.innerHTML = '<option value="all">All Categories</option>' + cats.map(c => `<option value="${c}">${c}</option>`).join('');
    }
  };
  const applyReportFilters = () => {
    const monthVal = document.getElementById('reportMonth').value;
    if (!monthVal) return;
    const [year, month] = monthVal.split('-');
    const accFilter = document.getElementById('filterAccount').value;
    const catFilter = document.getElementById('filterCategory').value;
    const filtered = allEntries.filter(e => {
      if (!e.date) return false;
      const d = new Date(e.date);
      if (d.getFullYear() != year || (d.getMonth()+1) != parseInt(month)) return false;
      if (accFilter !== 'all' && e.account !== accFilter) return false;
      if (catFilter !== 'all' && e.particulars !== catFilter) return false;
      return true;
    });
    let incSum = 0, expSum = 0;
    filtered.forEach(e => { incSum += e.credit || 0; expSum += e.debit || 0; });
    document.getElementById('reportIncome').innerHTML = formatINR(incSum);
    document.getElementById('reportExpense').innerHTML = formatINR(expSum);
    const tbody = document.getElementById('reportTableBody');
    if (!filtered.length) {
      tbody.innerHTML = '<tr><td colspan="6" class="text-center py-5 text-slate-400">No entries</td></tr>';
      return;
    }
    tbody.innerHTML = filtered.map(e => {
      const amount = (e.credit || 0) > 0 ? e.credit : e.debit;
      const cls = (e.credit || 0) > 0 ? 'text-emerald-600' : 'text-rose-600';
      let locHtml = (e.lat && e.lng) ? `<a href="https://maps.google.com/?q=${e.lat},${e.lng}" target="_blank" class="text-teal-600 text-xs">📍</a>` : '<span class="text-slate-300">—</span>';
      let receiptHtml = (e.receipt && e.receipt.length > 50) ? `<button onclick="showReceipt('${e.receipt}')" class="text-teal-600 text-xs">📸</button>` : '<span class="text-slate-300">—</span>';
      return `<tr class="border-b border-slate-100 dark:border-slate-800"><td class="py-2 text-xs">${formatDateMDY(e.date)}</td><td class="py-2">${e.account}</td><td class="py-2">${e.particulars}</td><td class="py-2 text-right font-bold ${cls}">${formatINR(amount)}</td><td class="py-2 text-center">${locHtml}</td><td class="py-2 text-center">${receiptHtml}</td></tr>`;
    }).join('');
  };
  window.showReceipt = (base64) => {
    const modal = document.getElementById('receiptModal');
    const img = document.getElementById('modalImage');
    img.src = base64;
    modal.classList.remove('opacity-0', 'pointer-events-none');
    modal.onclick = () => {
      modal.classList.add('opacity-0', 'pointer-events-none');
    };
  };

  // voice input
  let recognition = null;
  const voiceBtn = document.getElementById('voiceBtn');
  if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SpeechRecognition();
    recognition.continuous = false;
    recognition.lang = 'en-IN';
    recognition.interimResults = false;
    recognition.onresult = (event) => {
      const text = event.results[0][0].transcript;
      document.getElementById('note').value = text;
      const amtMatch = text.match(/(\d+(?:\.\d{1,2})?)/);
      if (amtMatch) {
        const amt = parseFloat(amtMatch[1]);
        if (!isNaN(amt)) {
          document.getElementById('debitAmount').value = amt;
          document.getElementById('creditAmount').value = '';
          showToast(`Amount ₹${amt} filled`);
        }
      }
    };
    recognition.onerror = () => showToast("Voice not recognized");
    voiceBtn.onclick = () => recognition.start();
  } else {
    voiceBtn.onclick = () => alert("Voice input not supported");
  }

  // receipt attachment
  const attachBtn = document.getElementById('attachReceiptBtn');
  const receiptInput = document.getElementById('receiptInput');
  const receiptPreview = document.getElementById('receiptPreview');
  attachBtn.onclick = () => receiptInput.click();
  receiptInput.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        let width = img.width, height = img.height;
        const maxSize = 800;
        if (width > maxSize) {
          height = (height * maxSize) / width;
          width = maxSize;
        }
        canvas.width = width;
        canvas.height = height;
        ctx.drawImage(img, 0, 0, width, height);
        const compressed = canvas.toDataURL('image/jpeg', 0.6);
        currentReceiptBase64 = compressed;
        receiptPreview.classList.remove('hidden');
        receiptPreview.innerHTML = '✓ Receipt attached (click to change)';
        showToast("Receipt ready");
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  };

  // location
  const locateBtn = document.getElementById('locateBtn');
  const locStatus = document.getElementById('locationStatus');
  locateBtn.onclick = () => {
    if (!navigator.geolocation) { alert("Location not supported"); return; }
    locStatus.classList.remove('hidden');
    locStatus.innerText = "📍 Getting location...";
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        document.getElementById('latitude').value = pos.coords.latitude;
        document.getElementById('longitude').value = pos.coords.longitude;
        locStatus.innerText = `✅ Location: ${pos.coords.latitude.toFixed(4)}, ${pos.coords.longitude.toFixed(4)}`;
        setTimeout(() => locStatus.classList.add('hidden'), 3000);
        showToast("Location captured");
      },
      (err) => {
        locStatus.innerText = `❌ ${err.message}`;
        setTimeout(() => locStatus.classList.add('hidden'), 3000);
      }
    );
  };

  // form submit
  document.getElementById('entryForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const date = document.getElementById('date').value;
    const mode = document.getElementById('mode').value;
    const account = document.getElementById('account').value;
    const particulars = document.getElementById('particulars').value;
    let credit = parseFloat(document.getElementById('creditAmount').value) || 0;
    let debit = parseFloat(document.getElementById('debitAmount').value) || 0;
    const note = document.getElementById('note').value;
    const lat = document.getElementById('latitude').value || null;
    const lng = document.getElementById('longitude').value || null;
    const receipt = currentReceiptBase64;
    if (!date || !account || !particulars) { alert("Fill all required fields"); return; }
    if (credit && debit) { alert("Cannot have both Income and Expense"); return; }
    if (!credit && !debit) { alert("Enter either Income or Expense amount"); return; }
    await addEntryLocal({ date, mode, account, particulars, credit, debit, note, lat, lng, receipt });
    // reset
    document.getElementById('creditAmount').value = '';
    document.getElementById('debitAmount').value = '';
    document.getElementById('note').value = '';
    document.getElementById('latitude').value = '';
    document.getElementById('longitude').value = '';
    locStatus.classList.add('hidden');
    currentReceiptBase64 = '';
    receiptPreview.classList.add('hidden');
    receiptInput.value = '';
    document.getElementById('date').valueAsDate = new Date();
  });

  // tabs
  const addPanel = document.getElementById('addPanel');
  const reportPanel = document.getElementById('reportPanel');
  const tabAdd = document.getElementById('tabAddBtn');
  const tabReport = document.getElementById('tabReportBtn');
  tabAdd.onclick = () => {
    addPanel.classList.remove('hidden');
    reportPanel.classList.add('hidden');
    tabAdd.classList.add('tab-active');
    tabAdd.classList.remove('tab-inactive');
    tabReport.classList.remove('tab-active');
    tabReport.classList.add('tab-inactive');
  };
  tabReport.onclick = () => {
    addPanel.classList.add('hidden');
    reportPanel.classList.remove('hidden');
    tabReport.classList.add('tab-active');
    tabReport.classList.remove('tab-inactive');
    tabAdd.classList.remove('tab-active');
    tabAdd.classList.add('tab-inactive');
    if (!document.getElementById('reportMonth').value) {
      const now = new Date();
      document.getElementById('reportMonth').value = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
    }
    updateFilterCategories();
    applyReportFilters();
  };
  document.getElementById('filterAccount').addEventListener('change', () => { updateFilterCategories(); applyReportFilters(); });
  document.getElementById('filterCategory').addEventListener('change', applyReportFilters);
  document.getElementById('applyReportBtn').addEventListener('click', applyReportFilters);
  document.getElementById('account').addEventListener('change', updateParticulars);

  // init
  (async () => {
    if (loadCache()) renderAllUI();
    await backgroundSync();
    document.getElementById('date').valueAsDate = new Date();
    renderAllUI();
  })();
</script>
</body>
</html>
